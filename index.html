<!DOCTYPE html>
<html>
<head>
  <title>Grade Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: black;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url("https://images.unsplash.com/photo-1517935706615-2717063c2225?q=80&w=1600&auto=format&fit=crop") center/cover;
      filter: brightness(0.4);
      z-index: -1;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-size: 40px;
    }

    button {
      margin: 10px;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      width: 80px;
      text-align: center;
    }

    .box {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
    }

    .menu {
      cursor: pointer;
      font-size: 24px;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div id="home" class="container">
  <h1>Grade Calculator</h1>

  <button onclick="openUni('tmu')">TMU</button>
  <button onclick="openUni('uoft')">UofT</button>
  <button onclick="openUni('york')">York</button>

  <p style="margin-top:40px;opacity:0.7;">
    © 2026 Kaaren Aryaan<br>
    Version 1.0
  </p>
</div>

<div id="app" class="container" style="display:none;">
  
  <div class="topbar">
    <span onclick="goHome()">⬅</span>
    <span class="menu" onclick="toggleMenu()">☰</span>
  </div>

  <h2 id="uniTitle"></h2>

  <div class="box">
    <h3>Current Grade</h3>
    <input id="current" type="number" placeholder="%" />
  </div>

  <div class="box">
    <h3>Final Weight</h3>
    <input id="weight" type="number" placeholder="%" />
  </div>

  <div class="box">
    <h3>Final Exam Score</h3>
    <input id="final" type="number" placeholder="%" />
  </div>

  <div class="box">
    <button onclick="calculate()">Calculate</button>
    <h2 id="result">N/A</h2>
    <h3 id="letter"></h3>
  </div>

</div>

<script>
let currentUni = "tmu";

const scales = {
  tmu: [
    [90,"A+"],[85,"A"],[80,"A-"],
    [77,"B+"],[73,"B"],[70,"B-"],
    [67,"C+"],[63,"C"],[60,"C-"],
    [57,"D+"],[53,"D"],[50,"D-"],
    [0,"F"]
  ],
  uoft: [
    [85,"A"],[80,"A-"],
    [77,"B+"],[73,"B"],[70,"B-"],
    [67,"C+"],[63,"C"],[60,"C-"],
    [57,"D+"],[53,"D"],[50,"D-"],
    [0,"F"]
  ],
  york: [
    [90,"A+"],[80,"A"],
    [75,"B+"],[70,"B"],
    [65,"C+"],[60,"C"],
    [55,"D+"],[50,"D"],
    [40,"E"],
    [0,"F"]
  ]
};

function openUni(uni){
  currentUni = uni;
  document.getElementById("home").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("uniTitle").innerText = uni.toUpperCase();
}

function goHome(){
  document.getElementById("home").style.display = "block";
  document.getElementById("app").style.display = "none";
}

function calculate(){
  let c = parseFloat(document.getElementById("current").value);
  let w = parseFloat(document.getElementById("weight").value);
  let f = parseFloat(document.getElementById("final").value);

  if(isNaN(c)||isNaN(w)||isNaN(f)){
    document.getElementById("result").innerText = "Enter values";
    return;
  }

  let overall = c*(1-w/100)+f*(w/100);
  document.getElementById("result").innerText = overall.toFixed(1)+"%";

  let scale = scales[currentUni];
  for(let i=0;i<scale.length;i++){
    if(overall >= scale[i][0]){
      document.getElementById("letter").innerText = "Grade: "+scale[i][1];
      break;
    }
  }
}
</script>

</body>
</html>
